<div class="container">
  <h1>MoltenDb + Angular Signals</h1>

  <div class="actions">
    <button (click)="addUser()">+ Add Random User</button>
    <button (click)="users.reload()" [disabled]="users.isLoading()">🔄 Refresh</button>
    <button (click)="clearUsers()" class="danger">🗑️ Clear All</button>
  </div>

  <hr>

  @if (users.isLoading() && !users.value()) {
    <p>Loading...</p>
  }

  @if (users.value()) {
    <ul>
      @for (user of users.value(); track user._key) {
        <li>{{ user.name }}</li>
      }
    </ul>
  }

  @if (users.error()) {
    <div class="alert">{{ users.error().message }}</div>
  }
</div>
